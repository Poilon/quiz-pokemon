<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Pokémon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            max-height: 100vh;
            max-height: 100dvh;
            overflow-y: auto;
        }

        @media (min-width: 768px) {
            .container {
                padding: 40px;
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        @media (min-width: 768px) {
            h1 {
                margin-bottom: 30px;
                font-size: 2em;
            }
        }

        .question-counter {
            text-align: center;
            font-size: 1em;
            color: #666;
            margin-bottom: 15px;
        }

        @media (min-width: 768px) {
            .question-counter {
                font-size: 1.2em;
                margin-bottom: 20px;
            }
        }

        .pokemon-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            min-height: 120px;
        }

        @media (min-width: 768px) {
            .pokemon-container {
                margin: 30px 0;
                min-height: 200px;
            }
        }

        .pokemon-img {
            max-width: 280px;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
            animation: fadeIn 0.5s ease-in;
        }

        @media (min-width: 768px) {
            .pokemon-img {
                max-width: 400px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideOut {
            to {
                opacity: 0;
                transform: translateX(-50px);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .feedback.show {
            animation: bounceIn 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                transform: scale(1);
            }
        }

        .pokemon-img.slide-out {
            animation: slideOut 0.3s ease-in forwards;
        }

        .pokemon-img.slide-in {
            animation: slideIn 0.3s ease-out;
        }

        .input-container {
            position: relative;
            margin: 15px 0;
        }

        @media (min-width: 768px) {
            .input-container {
                margin: 30px 0;
            }
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        @media (min-width: 768px) {
            input {
                padding: 15px;
                font-size: 1.1em;
            }
        }

        input:focus {
            border-color: #667eea;
        }

        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .suggestion-item:hover,
        .suggestion-item.selected {
            background-color: #667eea;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        @media (min-width: 768px) {
            button {
                padding: 15px;
                font-size: 1.1em;
                margin-top: 20px;
            }
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .feedback {
            text-align: center;
            margin-top: 10px;
            font-size: 1em;
            font-weight: bold;
            min-height: 25px;
        }

        @media (min-width: 768px) {
            .feedback {
                margin-top: 20px;
                font-size: 1.2em;
                min-height: 30px;
            }
        }

        .feedback.correct {
            color: #28a745;
        }

        .feedback.incorrect {
            color: #dc3545;
        }

        .score {
            text-align: center;
            font-size: 1.2em;
            margin-top: 10px;
            color: #667eea;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .score {
                font-size: 1.5em;
                margin-top: 20px;
            }
        }

        .final-screen {
            text-align: center;
        }

        .final-screen h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        @media (min-width: 768px) {
            .final-screen h2 {
                margin-bottom: 20px;
                font-size: 2em;
            }
        }

        .final-score {
            font-size: 2em;
            color: #667eea;
            margin: 20px 0;
            font-weight: bold;
        }

        @media (min-width: 768px) {
            .final-score {
                font-size: 3em;
                margin: 30px 0;
            }
        }

        .hidden {
            display: none;
        }

        .difficulty-screen {
            text-align: center;
        }

        .difficulty-screen h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        @media (min-width: 768px) {
            .difficulty-screen h2 {
                margin-bottom: 30px;
                font-size: 1.8em;
            }
        }

        .difficulty-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .difficulty-btn {
            padding: 15px;
            font-size: 1em;
            border-radius: 15px;
            transition: all 0.3s;
        }

        @media (min-width: 768px) {
            .difficulty-btn {
                padding: 20px;
                font-size: 1.2em;
            }
        }

        .difficulty-btn.easy {
            background: #28a745;
        }

        .difficulty-btn.easy:hover {
            background: #218838;
        }

        .difficulty-btn.medium {
            background: #ffc107;
            color: #333;
        }

        .difficulty-btn.medium:hover {
            background: #e0a800;
        }

        .difficulty-btn.hard {
            background: #dc3545;
        }

        .difficulty-btn.hard:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Quiz Pokémon ⚡</h1>
        
        <div id="difficulty-screen" class="difficulty-screen">
            <h2>Choisissez votre difficulté</h2>
            <div class="difficulty-buttons">
                <button class="difficulty-btn easy" data-difficulty="easy">Facile - Pokémon connus (1-50)</button>
                <button class="difficulty-btn medium" data-difficulty="medium">Moyen - 1ère & 2ème gen (1-100)</button>
                <button class="difficulty-btn hard" data-difficulty="hard">Difficile - Les 151 premiers</button>
            </div>
        </div>
        
        <div id="quiz-screen" class="hidden">
            <div class="question-counter">
                Question <span id="current-question">1</span> / 10
            </div>
            
            <div class="pokemon-container">
                <img class="pokemon-img" id="pokemon-display" src="" alt="Pokémon">
            </div>
            
            <div class="input-container">
                <input 
                    type="text" 
                    id="pokemon-input" 
                    placeholder="Quel est ce Pokémon ?"
                    autocomplete="off"
                >
                <div class="suggestions" id="suggestions"></div>
            </div>
            
            <button id="submit-btn">Valider</button>
            
            <div class="feedback" id="feedback"></div>
            <div class="score">Score : <span id="current-score">0</span> / 10</div>
        </div>
        
        <div id="final-screen" class="final-screen hidden">
            <h2>Quiz terminé !</h2>
            <div class="final-score" id="final-score">0 / 10</div>
            <button id="restart-btn">Recommencer</button>
        </div>
    </div>

            { name: "Mew", id: 151, difficulty: "hard" }

        let currentQuestion = 0;
        let score = 0;
        let selectedPokemon = [];
        let currentPokemon = null;
        let selectedSuggestionIndex = -1;
        let currentDifficulty = null;
        let pokemon = [];

        const elements = {
            pokemonDisplay: document.getElementById('pokemon-display'),
            input: document.getElementById('pokemon-input'),
            suggestions: document.getElementById('suggestions'),
            submitBtn: document.getElementById('submit-btn'),
            feedback: document.getElementById('feedback'),
            currentQuestionSpan: document.getElementById('current-question'),
            currentScoreSpan: document.getElementById('current-score'),
            difficultyScreen: document.getElementById('difficulty-screen'),
            quizScreen: document.getElementById('quiz-screen'),
            finalScreen: document.getElementById('final-screen'),
            finalScore: document.getElementById('final-score'),
            restartBtn: document.getElementById('restart-btn')
        };

        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const difficulty = btn.dataset.difficulty;
                startQuiz(difficulty);
            });
        });

        function startQuiz(difficulty) {
            currentDifficulty = difficulty;
            
            if (difficulty === 'easy') {
                pokemon = allPokemon.filter(p => p.difficulty === 'easy');
            } else if (difficulty === 'medium') {
                pokemon = allPokemon.filter(p => p.difficulty === 'easy' || p.difficulty === 'medium');
            } else {
                pokemon = allPokemon;
            }
            
            elements.difficultyScreen.classList.add('hidden');
            elements.quizScreen.classList.remove('hidden');
            initQuiz();
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function initQuiz() {
            currentQuestion = 0;
            score = 0;
            selectedPokemon = shuffleArray(pokemon).slice(0, 10);
            elements.currentScoreSpan.textContent = '0';
            showQuestion();
        }

        function showQuestion() {
            if (currentQuestion >= 10) {
                showFinalScreen();
                return;
            }

            currentPokemon = selectedPokemon[currentQuestion];
            elements.pokemonDisplay.classList.remove('slide-out', 'slide-in');
            void elements.pokemonDisplay.offsetWidth;
            elements.pokemonDisplay.classList.add('slide-in');
            elements.pokemonDisplay.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${currentPokemon.id}.png`;
            elements.currentQuestionSpan.textContent = currentQuestion + 1;
            elements.input.value = '';
            elements.feedback.textContent = '';
            elements.feedback.className = 'feedback';
            elements.input.focus();
            elements.suggestions.classList.remove('active');
            selectedSuggestionIndex = -1;
        }

        function normalizeString(str) {
            return str.toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9\s]/g, "")
                .trim();
        }

        function showSuggestions(value) {
            if (!value) {
                elements.suggestions.classList.remove('active');
                return;
            }

            const normalizedValue = normalizeString(value);
            const matches = pokemon.filter(p => 
                normalizeString(p.name).includes(normalizedValue)
            ).slice(0, 5);

            if (matches.length === 0) {
                elements.suggestions.classList.remove('active');
                return;
            }

            elements.suggestions.innerHTML = matches.map((p, index) => 
                `<div class="suggestion-item" data-pokemon="${p.name}" data-index="${index}">${p.name}</div>`
            ).join('');
            
            elements.suggestions.classList.add('active');
            selectedSuggestionIndex = -1;
        }

        function selectSuggestion(pokemonName) {
            elements.input.value = pokemonName;
            elements.suggestions.classList.remove('active');
            selectedSuggestionIndex = -1;
        }

        elements.input.addEventListener('input', (e) => {
            showSuggestions(e.target.value);
        });

        elements.input.addEventListener('keydown', (e) => {
            const suggestionItems = elements.suggestions.querySelectorAll('.suggestion-item');
            
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (suggestionItems.length > 0) {
                    selectedSuggestionIndex = Math.min(selectedSuggestionIndex + 1, suggestionItems.length - 1);
                    updateSuggestionSelection(suggestionItems);
                }
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (suggestionItems.length > 0) {
                    selectedSuggestionIndex = Math.max(selectedSuggestionIndex - 1, 0);
                    updateSuggestionSelection(suggestionItems);
                }
            } else if (e.key === 'Enter') {
                e.preventDefault();
                if (selectedSuggestionIndex >= 0 && suggestionItems[selectedSuggestionIndex]) {
                    selectSuggestion(suggestionItems[selectedSuggestionIndex].dataset.pokemon);
                } else {
                    submitAnswer();
                }
            } else if (e.key === 'Escape') {
                elements.suggestions.classList.remove('active');
                selectedSuggestionIndex = -1;
            }
        });

        function updateSuggestionSelection(suggestionItems) {
            suggestionItems.forEach((item, index) => {
                if (index === selectedSuggestionIndex) {
                    item.classList.add('selected');
                    item.scrollIntoView({ block: 'nearest' });
                } else {
                    item.classList.remove('selected');
                }
            });
        }

        elements.suggestions.addEventListener('click', (e) => {
            if (e.target.classList.contains('suggestion-item')) {
                selectSuggestion(e.target.dataset.pokemon);
            }
        });

        elements.submitBtn.addEventListener('click', submitAnswer);

        function submitAnswer() {
            const answer = elements.input.value.trim();
            
            if (!answer) {
                return;
            }

            const isCorrect = normalizeString(answer) === normalizeString(currentPokemon.name);
            
            if (isCorrect) {
                score++;
                elements.feedback.textContent = '✓ Correct !';
                elements.feedback.className = 'feedback correct show';
            } else {
                elements.feedback.textContent = `✗ Faux ! C'était ${currentPokemon.name}`;
                elements.feedback.className = 'feedback incorrect show';
            }

            elements.currentScoreSpan.textContent = score;
            elements.submitBtn.disabled = true;
            elements.input.disabled = true;

            elements.pokemonDisplay.classList.add('slide-out');

            setTimeout(() => {
                currentQuestion++;
                elements.submitBtn.disabled = false;
                elements.input.disabled = false;
                showQuestion();
            }, 800);
        }

        function showFinalScreen() {
            elements.quizScreen.classList.add('hidden');
            elements.finalScreen.classList.remove('hidden');
            elements.finalScore.textContent = `${score} / 10`;
        }

        elements.restartBtn.addEventListener('click', () => {
            elements.finalScreen.classList.add('hidden');
            elements.difficultyScreen.classList.remove('hidden');
        });
    </script>
</body>
</html>
